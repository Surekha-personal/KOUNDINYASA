<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Koundinyasa HR Portal</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6f9;
}

/* HEADER */

header{
background:#1f3c88;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#ffd166;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:250px 1fr;
height:90vh;
}

/* SIDEBAR */

.sidebar{
background:#2a5298;
color:white;
padding:20px;
}

.sidebar h3{
border-bottom:1px solid white;
padding-bottom:10px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-top:5px;
border-radius:5px;
}

.sidebar a:hover{
background:#1f3c88;
}

/* MAIN CONTENT */

.content{
padding:30px;
}

/* PROFILE CARD */

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.card h2{
margin-top:0;
}

/* BUTTONS */

.btn{
background:#1f3c88;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

.btn:hover{
background:#16306b;
}

/* FORM */

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

</style>
</head>

<body>

<header>

<h1 id="portalTitle">Koundinyasa HR Portal</h1>

<nav>
<a id="homeLink" href="#">Home</a>
<a id="profileLink" href="#">Profile</a>
<a id="leaveMenu" href="#">Leave</a>
<a id="payrollMenu" href="#">Payroll</a>
<a id="logoutBtn" href="#">Logout</a>
</nav>

</header>


<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Employee Menu</h3>

<a id="dashboardLink" href="#">Dashboard</a>
<a id="attendanceLink" href="#">Attendance</a>
<a id="leaveLink" href="#">Apply Leave</a>
<a id="payrollLink" href="#">Payroll</a>
<a id="settingsLink" href="#">Settings</a>

</div>


<!-- MAIN CONTENT -->

<div class="content">

<div class="card">

<h2 id="welcomeText">Welcome Employee</h2>

<p>ID: <span id="empId">EMP1001</span></p>
<p>Department: <span id="department">IT</span></p>

<button class="btn" id="viewProfileBtn">View Profile</button>

</div>


<div class="card">

<h2>Apply Leave</h2>

<form id="leaveForm">

<label>Leave Type</label>

<select id="leaveType">
<option>Casual Leave</option>
<option>Sick Leave</option>
<option>Annual Leave</option>
</select>

<label>From Date</label>

<input type="date" id="fromDate">

<label>To Date</label>

<input type="date" id="toDate">

<label>Reason</label>

<input type="text" id="reason">

<button class="btn" id="applyLeaveBtn">Submit Leave</button>

</form>

</div>


<div class="card">

<h2>Quick Actions</h2>

<button class="btn" id="downloadPayslip">Download Payslip</button>

<button class="btn" id="updateProfile">Update Profile</button>

</div>

</div>

</div>

</body>
</html>
