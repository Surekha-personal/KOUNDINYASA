<!DOCTYPE html>
<html>
<head>
<title>GTS HR Portal</title>

<style>

body{
font-family: Arial;
background-color:#f2f2f2;
}

.header{
background-color:#2c3e50;
color:white;
padding:15px;
text-align:center;
}

.menu{
background-color:#34495e;
overflow:hidden;
}

.menu a{
float:left;
display:block;
color:white;
padding:14px 20px;
text-decoration:none;
}

.menu a:hover{
background-color:#1abc9c;
}

.container{
padding:20px;
background:white;
width:500px;
margin:auto;
margin-top:30px;
border-radius:5px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:#1abc9c;
color:white;
border:none;
padding:10px;
width:100%;
}

</style>

</head>

<body>

<div class="header">
<h1 id="portalTitle">GTS HR Portal</h1>
</div>

<div class="menu">
<a id="homeLink" href="#">Home</a>
<a id="employeeLink" href="#">Employees</a>
<a id="leaveLink" href="#">Leave</a>
<a id="payrollLink" href="#">Payroll</a>
<a id="contactLink" href="#">Contact</a>
</div>

<div class="container">

<h2>Employee Registration</h2>

<form id="registrationForm">

<label>Employee Name</label>
<input type="text" id="empName" name="empName">

<label>Email</label>
<input type="email" id="email" name="email">

<label>Department</label>
<select id="department" name="department">
<option>HR</option>
<option>IT</option>
<option>Finance</option>
<option>Admin</option>
</select>

<label>Gender</label>

<input type="radio" id="male" name="gender" value="Male"> Male
<input type="radio" id="female" name="gender" value="Female"> Female

<br><br>

<label>Skills</label>

<input type="checkbox" id="java" name="skills"> Java
<input type="checkbox" id="selenium" name="skills"> Selenium
<input type="checkbox" id="sql" name="skills"> SQL

<br><br>

<button id="submitBtn">Register</button>

</form>

</div>

</body>
</html>
